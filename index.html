<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 NHL Playoff Pool</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ice: #e8f4f8;
      --deep: #060d1a;
      --rink: #0a1628;
      --blue: #1a56db;
      --gold: #f0a500;
      --red: #e02020;
      --line: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.35);
      --card: rgba(255,255,255,0.04);
      --card-hover: rgba(255,255,255,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--deep);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background rink lines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(26,86,219,0.18) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.03) 79px, rgba(255,255,255,0.03) 80px);
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      padding: 40px 0 24px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 32px;
    }

    .header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo-block h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      letter-spacing: 0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 40%, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-block .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .last-updated {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .refresh-btn {
      background: var(--blue);
      border: none;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding: 8px 18px;
      cursor: pointer;
      border-radius: 3px;
      transition: opacity 0.2s, transform 0.15s;
      text-transform: uppercase;
    }
    .refresh-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .refresh-btn:active { transform: translateY(0); }
    .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

    /* ── Scoreboard ── */
    .scoreboard {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .scoreboard::-webkit-scrollbar { display: none; }

    .score-card {
      flex: 1;
      min-width: 140px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 18px 16px;
      text-align: center;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .score-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--manager-color, var(--blue)), transparent);
    }
    .score-card:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.15); }
    .score-card.active { border-color: var(--manager-color, var(--blue)); background: rgba(255,255,255,0.06); }

    .score-card .manager-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      letter-spacing: 0.06em;
      color: var(--manager-color, #fff);
      line-height: 1;
    }

    .score-card .total-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      line-height: 1.1;
      color: #fff;
      margin: 6px 0 2px;
    }

    .score-card .pts-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Rank badge ── */
    .rank-badge {
      position: absolute;
      top: 10px; right: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
    }

    /* ── View controls ── */
    .view-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .view-btn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      padding: 7px 16px;
      cursor: pointer;
      border-radius: 3px;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .view-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
    .view-btn.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); color: #fff; }

    .view-sep { flex: 1; }

    .filter-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Teams grid ── */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .team-panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      transition: opacity 0.3s;
    }
    .team-panel.dimmed { opacity: 0.3; }

    .team-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
    }

    .team-header-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      color: var(--manager-color, #fff);
    }

    .team-header-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: #fff;
    }

    /* ── Player rows ── */
    .player-section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 10px 18px 4px;
      border-top: 1px solid var(--line);
    }
    .player-section-label:first-of-type { border-top: none; }

    .player-row {
      display: grid;
      grid-template-columns: 36px 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
    }
    .player-row:last-child { border-bottom: none; }
    .player-row:hover { background: rgba(255,255,255,0.04); }

    .team-abbr {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      text-align: center;
    }

    .player-name {
      font-size: 0.82rem;
      font-weight: 400;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-stats {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .stat-chip {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
      background: rgba(255,255,255,0.06);
      padding: 2px 5px;
      border-radius: 2px;
    }
    .stat-chip.has-val { color: rgba(255,255,255,0.7); }

    .player-pts {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--gold);
      min-width: 24px;
      text-align: right;
    }
    .player-pts.zero { color: var(--muted); }

    /* ── Loading skeleton ── */
    .skeleton {
      display: inline-block;
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.06) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 2px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Error banner ── */
    .error-banner {
      background: rgba(224,32,32,0.12);
      border: 1px solid rgba(224,32,32,0.3);
      color: #ff8080;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 12px 18px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
      letter-spacing: 0.05em;
    }
    .error-banner.show { display: block; }

    /* ── Leaderboard / single-column view ── */
    .leaderboard-view { display: none; }
    .leaderboard-view.active { display: block; }
    .teams-view { display: block; }
    .teams-view.hidden { display: none; }

    .lb-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .lb-table thead th {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
    }
    .lb-table thead th.num { text-align: right; }
    .lb-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .lb-table tbody tr:hover { background: rgba(255,255,255,0.04); }
    .lb-table tbody td { padding: 9px 14px; }
    .lb-table tbody td.num {
      font-family: 'DM Mono', monospace;
      text-align: right;
      color: var(--muted);
    }
    .lb-table tbody td.pts-col {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      text-align: right;
      color: var(--gold);
    }
    .lb-mgr {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
    }

    /* ── Footer ── */
    footer {
      margin-top: 60px;
      padding: 24px 0;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    footer p {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .scoring-legend {
      display: flex;
      gap: 16px;
    }
    .legend-item {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .legend-item span {
      color: var(--gold);
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .teams-grid { grid-template-columns: 1fr; }
      .scoreboard { gap: 8px; }
      .score-card { min-width: 110px; }
    }
  </style>
</head>

  <footer>

</div>

// ─────────────────────────────────────────────
//  SCORING
// ─────────────────────────────────────────────
function calcPoints(stats, type) {
  if (!stats) return 0;
  if (type === 'goalie') {
    return (stats.wins || 0) * 1 + (stats.shutouts || 0) * 4;
  }
  return (stats.goals || 0) + (stats.assists || 0);
}

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let playerStats = {}; // nhlId => { goals, assists, wins, shutouts }
let activeManager = null;
let currentView = 'teams';

// ─────────────────────────────────────────────
//  NHL API — uses the free stats.nhl.com edge
// ─────────────────────────────────────────────
async function fetchPlayerStats(nhlId, type) {
  try {
    // NHL's new API: /v1/player/{id}/game-log/now  returns current season game log
    const url = `https://api-web.nhle.com/v1/player/${nhlId}/game-log/now`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();

    const logs = data.gameLog || [];
    // Filter to playoff games only (gameType 3 = playoffs)
    const playoffLogs = logs.filter(g => g.gameTypeId === 3 || g.gameType === 3);

    if (type === 'goalie') {
      const wins = playoffLogs.filter(g => g.decision === 'W').length;
      const shutouts = playoffLogs.reduce((s, g) => s + (g.shotsAgainst > 0 && g.goalsAgainst === 0 ? 1 : 0), 0);
      return { wins, shutouts };
    } else {
      const goals   = playoffLogs.reduce((s, g) => s + (g.goals   || 0), 0);
      const assists = playoffLogs.reduce((s, g) => s + (g.assists || 0), 0);
      return { goals, assists };
    }
  } catch (e) {
    return null;
  }
}

async function fetchAllStats() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.textContent = '↻ Loading…';
  showError(null);

  // Collect unique player IDs
  const all = [];
  Object.values(DRAFT).forEach(players => {
    players.forEach(p => {
      if (!all.find(x => x.nhlId === p.nhlId)) all.push(p);
    });
  });

  // Batch fetches
  const results = await Promise.allSettled(
    all.map(p => fetchPlayerStats(p.nhlId, p.type).then(s => ({ nhlId: p.nhlId, stats: s, type: p.type })))
  );

  let anyFailed = false;
  results.forEach(r => {
    if (r.status === 'fulfilled' && r.value) {
      playerStats[r.value.nhlId] = r.value.stats;
      if (!r.value.stats) anyFailed = true;
    } else {
      anyFailed = true;
    }
  });

  if (anyFailed) {
    showError('Some player stats could not be fetched. NHL API may be unavailable. Showing available data.');
  }

  document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  btn.classList.remove('loading');
  btn.textContent = '↻ Refresh';

  render();
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function managerTotal(managerId) {
  return DRAFT[managerId].reduce((sum, p) => {
    const s = playerStats[p.nhlId];
    return sum + calcPoints(s, p.type);
  }, 0);
}

function renderScoreboard() {
  const sorted = MANAGERS.map(m => ({ ...m, total: managerTotal(m.id) }))
    .sort((a, b) => b.total - a.total);

  const el = document.getElementById('scoreboard');
  el.innerHTML = sorted.map((m, i) => `
    <div class="score-card ${activeManager === m.id ? 'active' : ''}"
         style="--manager-color: ${m.color}"
         onclick="toggleManager('${m.id}')">
      <div class="rank-badge">#${i+1}</div>
      <div class="manager-name">${m.name}</div>
      <div class="total-pts">${m.total}</div>
      <div class="pts-label">Points</div>
    </div>
  `).join('');
}

function renderTeams() {
  const grid = document.getElementById('teamsGrid');
  grid.innerHTML = MANAGERS.map(m => {
    const players = DRAFT[m.id];
    const skaters = players.filter(p => p.type === 'skater');
    const goalies  = players.filter(p => p.type === 'goalie');
    const total = managerTotal(m.id);
    const dimmed = activeManager && activeManager !== m.id;

    const playerRow = (p) => {
      const s = playerStats[p.nhlId];
      const pts = calcPoints(s, p.type);
      const isGoalie = p.type === 'goalie';
      const statsHtml = isGoalie
        ? `<span class="stat-chip ${s && s.wins ? 'has-val' : ''}">W:${s ? s.wins : '–'}</span>
           <span class="stat-chip ${s && s.shutouts ? 'has-val' : ''}">SO:${s ? s.shutouts : '–'}</span>`
        : `<span class="stat-chip ${s && s.goals ? 'has-val' : ''}">G:${s ? s.goals : '–'}</span>
           <span class="stat-chip ${s && s.assists ? 'has-val' : ''}">A:${s ? s.assists : '–'}</span>`;

      return `<div class="player-row">
        <div class="team-abbr">${p.team}</div>
        <div class="player-name">${p.name}</div>
        <div class="player-stats">${statsHtml}</div>
        <div class="player-pts ${pts === 0 ? 'zero' : ''}">${pts}</div>
      </div>`;
    };

    return `
      <div class="team-panel ${dimmed ? 'dimmed' : ''}">
        <div class="team-header" style="border-left: 3px solid ${m.color}">
          <div class="team-header-name" style="--manager-color:${m.color}">${m.name}</div>
          <div class="team-header-score">${total}</div>
        </div>
        <div class="player-section-label">Skaters</div>
        ${skaters.map(playerRow).join('')}
        <div class="player-section-label">Goalies</div>
        ${goalies.map(playerRow).join('')}
      </div>
    `;
  }).join('');
}

function renderLeaderboard() {
  const rows = [];
  MANAGERS.forEach(m => {
    DRAFT[m.id].forEach(p => {
      const s = playerStats[p.nhlId];
      const pts = calcPoints(s, p.type);
      rows.push({ manager: m, player: p, stats: s, pts });
    });
  });
  rows.sort((a, b) => b.pts - a.pts);

  const filtered = activeManager ? rows.filter(r => r.manager.id === activeManager) : rows;

  document.getElementById('lbBody').innerHTML = filtered.map((r, i) => {
    const s = r.stats;
    const isGoalie = r.player.type === 'goalie';
    return `<tr>
      <td class="num" style="color:var(--muted)">${i+1}</td>
      <td><span class="lb-mgr" style="color:${r.manager.color}">${r.manager.name}</span></td>
      <td>${r.player.name}</td>
      <td class="num">${r.player.team}</td>
      <td class="num">${isGoalie ? '—' : (s ? s.goals : '–')}</td>
      <td class="num">${isGoalie ? '—' : (s ? s.assists : '–')}</td>
      <td class="num">${isGoalie ? (s ? s.wins : '–') : '—'}</td>
      <td class="num">${isGoalie ? (s ? s.shutouts : '–') : '—'}</td>
      <td class="pts-col">${r.pts}</td>
    </tr>`;
  }).join('');
}

function render() {
  renderScoreboard();
  renderTeams();
  renderLeaderboard();

  const filterLabel = document.getElementById('filterLabel');
  if (activeManager) {
    const m = MANAGERS.find(x => x.id === activeManager);
    filterLabel.textContent = `Filtered: ${m.name}`;
    filterLabel.style.color = m.color;
  } else {
    filterLabel.textContent = '';
  }
}

// ─────────────────────────────────────────────
//  CONTROLS
// ─────────────────────────────────────────────
function toggleManager(id) {
  activeManager = activeManager === id ? null : id;
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('teamsView').classList.toggle('hidden', v !== 'teams');
  document.getElementById('leaderboardView').classList.toggle('active', v === 'leaderboard');
  document.getElementById('btnTeams').classList.toggle('active', v === 'teams');
  document.getElementById('btnLeaderboard').classList.toggle('active', v === 'leaderboard');
  render();
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  if (msg) { el.textContent = msg; el.classList.add('show'); }
  else { el.classList.remove('show'); }
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
render(); // Initial render with zero stats
fetchAllStats();
setInterval(fetchAllStats, 5 * 60 * 1000); // Refresh every 5 min
</script>
