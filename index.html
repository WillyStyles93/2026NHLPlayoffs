<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>2026 NHL Playoff Pool</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --deep: #060d1a;
      --blue: #1a56db;
      --gold: #f0a500;
      --line: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.4);
      --card: rgba(255,255,255,0.04);
      --card-hover: rgba(255,255,255,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--deep);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(26,86,219,0.18) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.025) 79px, rgba(255,255,255,0.025) 80px);
      pointer-events: none; z-index: 0;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 14px; position: relative; z-index: 1; }

    /* Header */
    header { padding: 20px 0 18px; border-bottom: 1px solid var(--line); margin-bottom: 18px; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .logo-block h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.7rem, 7vw, 3.6rem);
      letter-spacing: 0.04em; line-height: 1;
      background: linear-gradient(135deg, #fff 40%, var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-block .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.56rem, 1.8vw, 0.7rem);
      letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-top: 3px;
    }
    .header-meta { display: flex; align-items: flex-end; flex-direction: column; gap: 5px; flex-shrink: 0; }
    .last-updated { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); display: block; text-align: right; }
    .refresh-btn {
      background: var(--blue); border: none; color: #fff;
      font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em;
      padding: 9px 16px; cursor: pointer; border-radius: 4px;
      transition: opacity 0.2s, transform 0.15s; text-transform: uppercase; white-space: nowrap;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .refresh-btn:active { transform: scale(0.96); opacity: 0.75; }
    .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

    /* Timestamp mobile - now always shown in header */
    .updated-mobile { display: none; }

    /* Scoreboard */
    .scoreboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 18px; }
    .score-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 8px;
      padding: clamp(8px, 2vw, 14px) clamp(4px, 1vw, 10px);
      text-align: center; cursor: pointer; position: relative; overflow: hidden;
      transition: background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .score-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--mgr-color, var(--blue)), transparent);
    }
    .score-card:active { background: var(--card-hover); }
    .score-card.active { border-color: var(--mgr-color, var(--blue)); background: rgba(255,255,255,0.06); }
    .score-card .rank { font-family: 'DM Mono', monospace; font-size: 0.52rem; color: var(--muted); margin-bottom: 1px; }
    .score-card .mgr  { font-family: 'Bebas Neue', sans-serif; font-size: clamp(0.85rem, 3.2vw, 1.25rem); letter-spacing: 0.05em; color: var(--mgr-color, #fff); line-height: 1; }
    .score-card .pts  { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.7rem, 5.5vw, 2.8rem); line-height: 1.05; color: #fff; margin: 3px 0 1px; }
    .score-card .lbl  { font-family: 'DM Mono', monospace; font-size: 0.52rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }

    /* Error */
    .error-banner {
      background: rgba(224,32,32,0.12); border: 1px solid rgba(224,32,32,0.3);
      color: #ff8080; font-family: 'DM Mono', monospace; font-size: 0.68rem;
      padding: 10px 14px; border-radius: 4px; margin-bottom: 14px;
      display: none; letter-spacing: 0.04em; line-height: 1.5;
    }
    .error-banner.show { display: block; }

    /* View controls */
    .view-controls { display: flex; gap: 6px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
    .view-btn {
      background: transparent; border: 1px solid var(--line); color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 0.63rem; letter-spacing: 0.1em;
      padding: 8px 13px; cursor: pointer; border-radius: 4px; text-transform: uppercase;
      transition: all 0.2s; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .view-btn:active { opacity: 0.7; }
    .view-btn.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); color: #fff; }
    .filter-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; margin-left: auto; }

    /* Teams grid */
    .teams-view.hidden { display: none; }
    .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 290px), 1fr)); gap: 14px; }

    .team-panel { background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; transition: opacity 0.3s; }
    .team-panel.dimmed { opacity: 0.22; }

    .team-header {
      padding: 11px 14px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.03); border-left: 3px solid var(--mgr-color, var(--blue));
    }
    .team-header-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; letter-spacing: 0.07em; color: var(--mgr-color, #fff); }
    .team-header-score { font-family: 'Bebas Neue', sans-serif; font-size: 1.45rem; color: #fff; }

    .section-label {
      font-family: 'DM Mono', monospace; font-size: 0.56rem; letter-spacing: 0.2em;
      color: var(--muted); text-transform: uppercase; padding: 7px 14px 2px;
      border-top: 1px solid var(--line);
    }
    .section-label:first-of-type { border-top: none; }

    .player-row {
      display: grid; grid-template-columns: 30px 1fr auto auto;
      align-items: center; gap: 5px; padding: 6px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .player-row:last-child { border-bottom: none; }
    .team-abbr { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); text-align: center; }
    .player-name { font-size: 0.8rem; color: rgba(255,255,255,0.88); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-stats { display: flex; gap: 3px; }
    .stat-chip { font-family: 'DM Mono', monospace; font-size: 0.55rem; color: var(--muted); background: rgba(255,255,255,0.06); padding: 2px 4px; border-radius: 2px; }
    .stat-chip.v { color: rgba(255,255,255,0.78); }
    .player-pts { font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500; color: var(--gold); min-width: 18px; text-align: right; }
    .player-pts.z { color: var(--muted); }
    .player-row.eliminated { opacity: 0.32; }
    .player-row.eliminated .player-name { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.25); }
    .player-row.eliminated .team-abbr { color: #e05555; }

    /* Collapsible roster */
    .team-header { cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; transition: background 0.18s; }
    .team-header:hover { background: rgba(255,255,255,0.07); }
    .team-header:active { background: rgba(255,255,255,0.1); }
    .toggle-pill {
      font-family: 'DM Mono', monospace; font-size: 0.52rem; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 3px 9px; flex-shrink: 0; margin-left: 8px;
      transition: background 0.18s, color 0.18s;
      display: flex; align-items: center; gap: 4px;
    }
    .toggle-pill .pill-arrow { font-size: 0.6rem; transition: transform 0.22s; display: inline-block; }
    .team-panel.collapsed .pill-arrow { transform: rotate(-90deg); }
    .team-header:hover .toggle-pill { background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.8); }
    .roster-body { overflow: hidden; transition: max-height 0.28s ease; }
    .team-panel.collapsed .roster-body { max-height: 0 !important; }

    /* Players remaining badge */
    .score-card .remaining { font-family: 'DM Mono', monospace; font-size: 0.5rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.06em; }
    .score-card .remaining .rem-active { color: rgba(255,255,255,0.65); }

    /* Leaderboard */
    .leaderboard-view { display: none; }
    .leaderboard-view.active { display: block; }
    .lb-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .lb-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 440px; }
    .lb-table thead th {
      font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); text-align: left;
      padding: 9px 11px; border-bottom: 1px solid var(--line); white-space: nowrap;
    }
    .lb-table thead th.r { text-align: right; }
    .lb-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
    .lb-table tbody td { padding: 8px 11px; }
    .lb-table tbody td.r { font-family: 'DM Mono', monospace; text-align: right; color: var(--muted); }
    .lb-table tbody td.p { font-family: 'DM Mono', monospace; font-weight: 500; text-align: right; color: var(--gold); }
    .lb-mgr { font-family: 'Bebas Neue', sans-serif; font-size: 0.88rem; letter-spacing: 0.05em; }

    /* Leaderboard filters */
    .lb-filters { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    .lb-filter-btn {
      background: transparent; border: 1px solid var(--line); color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em;
      padding: 6px 12px; cursor: pointer; border-radius: 20px; text-transform: uppercase;
      transition: all 0.18s; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .lb-filter-btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
    .lb-filter-btn.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.35); color: #fff; }
    .lb-filter-count { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); margin-left: 4px; }

    /* Active Today view */
    .today-view { display: none; }
    .today-view.active { display: block; }
    .today-games-bar {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
    }
    .today-matchup {
      font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.08em;
      background: rgba(255,255,255,0.05); border: 1px solid var(--line);
      border-radius: 20px; padding: 4px 11px; color: rgba(255,255,255,0.6);
      white-space: nowrap;
    }
    .today-matchup span { color: #fff; }
    .today-empty {
      font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted);
      text-align: center; padding: 40px 0; letter-spacing: 0.08em;
    }

    /* Footer */
    footer { margin-top: 44px; padding: 18px 0; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    footer p, .li { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.06em; }
    .scoring-legend { display: flex; gap: 10px; flex-wrap: wrap; }
    .li span { color: var(--gold); font-weight: 500; }
  </style>
</head>

        </tr></thead>
        <tbody id="lbBody"></tbody>
      </table>
    </div>
  </div>

  <footer>
    <div class="scoring-legend">
      <div class="li">Goal <span>+1</span></div>
      <div class="li">Assist <span>+1</span></div>

</div>

// ── Today's games — fetched live from /api/today ──
let todaySchedule = { games: [], teams: new Set(), error: null, loaded: false };

async function fetchTodayGames() {
  try {
    const res = await fetch('/api/today');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const games = (data.matchups || []).map(m => [m.home, m.away]);
    todaySchedule = { games, teams: new Set(games.flat()), error: null, loaded: true };
  } catch (err) {
    todaySchedule = { games: [], teams: new Set(), error: err.message, loaded: true };
  }
  renderToday();
}

function getTodayTeams() {
  return { games: todaySchedule.games, teams: todaySchedule.teams };
}

// Schedule a refresh at the next 5:00 AM ET
function scheduleNextDayRefresh() {
  const nowET = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const next5am = new Date(nowET);
  next5am.setHours(5, 0, 0, 0);
  if (nowET >= next5am) next5am.setDate(next5am.getDate() + 1);
  const msUntil = next5am - nowET;
  setTimeout(() => {
    fetchTodayGames();
    scheduleNextDayRefresh(); // re-schedule for the following day
  }, msUntil);
}

// ── Scoring ──
function activePlayers(id) {
  const active = new Set(ACTIVE_TEAMS[id] || []);
  if (active.size === 0) return DRAFT[id].length; // fallback: all active
  return DRAFT[id].filter(p => active.has(p.team)).length;
}

function calc(stats, type) {
  if (!stats) return 0;
  return type === 'goalie'
    ? (stats.wins || 0) + (stats.shutouts || 0) * 4
    : (stats.goals || 0) + (stats.assists || 0);
}

// ── State ──
let playerStats = {};
let activeManager = null;
let currentView = 'teams';
let lbShowTop20 = false;
let lbActiveOnly = false;

// ── Fetch ──
async function fetchPlayerStats(nhlId, type) {
  try {
    // NHL Stats REST API — returns aggregate 2025-26 playoff totals directly
    const res = await fetch(`/api/player?id=${nhlId}&type=${type}`);
    if (!res.ok) return type === 'goalie' ? { wins: 0, shutouts: 0 } : { goals: 0, assists: 0 };
    const data = await res.json();
    const row = (data.data || [])[0];
    if (!row) return type === 'goalie' ? { wins: 0, shutouts: 0 } : { goals: 0, assists: 0 };
    if (type === 'goalie') return { wins: row.wins || 0, shutouts: row.shutouts || 0 };
    return { goals: row.goals || 0, assists: row.assists || 0 };
  } catch { return null; }
}

async function fetchAllStats() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.textContent = '↻ Loading…';
  showError(null);

  const seen = new Set(), all = [];
  Object.values(DRAFT).forEach(ps => ps.forEach(p => { if (!seen.has(p.nhlId)) { seen.add(p.nhlId); all.push(p); } }));

  let anyFailed = false;
  for (let i = 0; i < all.length; i += 5) {
    const results = await Promise.allSettled(
      all.slice(i, i + 5).map(p => fetchPlayerStats(p.nhlId, p.type).then(s => ({ nhlId: p.nhlId, stats: s })))
    );
    results.forEach(r => {
      if (r.status === 'fulfilled' && r.value) {
        playerStats[r.value.nhlId] = r.value.stats;
        if (!r.value.stats) anyFailed = true;
      } else anyFailed = true;
    });
  }

  if (anyFailed) showError('Some stats unavailable — NHL API may be rate-limiting. Partial data shown.');
  const t = 'Updated ' + new Date().toLocaleTimeString();
  document.getElementById('lastUpdated').textContent = t;
  document.getElementById('lastUpdatedMobile').textContent = t;
  btn.classList.remove('loading'); btn.textContent = '↻ Refresh';
  render();
}

// ── Render helpers ──
function total(id) { return DRAFT[id].reduce((s, p) => s + calc(playerStats[p.nhlId], p.type), 0); }

function renderScoreboard() {
  const sorted = MANAGERS.map(m => ({ ...m, t: total(m.id) })).sort((a, b) => b.t - a.t);
  document.getElementById('scoreboard').innerHTML = sorted.map((m, i) => {
    const alive = activePlayers(m.id);
    const total_r = DRAFT[m.id].length;
    const remLabel = alive === total_r ? `${total_r} players` : `${alive}/${total_r} remaining`;
    return `
    <div class="score-card ${activeManager === m.id ? 'active' : ''}" style="--mgr-color:${m.color}" onclick="toggleManager('${m.id}')">
      <div class="rank">#${i+1}</div>
      <div class="mgr">${m.name}</div>
      <div class="pts">${m.t}</div>
      <div class="lbl">PTS</div>
      <div class="remaining"><span class="rem-active">${remLabel}</span></div>
    </div>`;
  }).join('');
}

function renderTeams() {
  const { teams: todayTeams } = getTodayTeams();
  document.getElementById('teamsGrid').innerHTML = MANAGERS.map(m => buildManagerPanel(m, todayTeams, 'teams')).join('');
  Object.keys(collapseState).forEach(id => { if (collapseState[id]) applyCollapse(id, true); });
}

function renderToday() {
  const { games, teams: todayTeams } = getTodayTeams();
  const bar = document.getElementById('todayGamesBar');
  const grid = document.getElementById('todayGrid');

  // Still loading
  if (!todaySchedule.loaded) {
    bar.innerHTML = '';
    grid.innerHTML = '<div class="today-empty">Loading today\'s games…</div>';
    return;
  }

  // API error
  if (todaySchedule.error) {
    bar.innerHTML = '';
    grid.innerHTML = `<div class="today-empty">Could not load today\'s schedule.<br><span style="font-size:0.55rem;opacity:0.5">${todaySchedule.error}</span></div>`;
    return;
  }

  // Games bar
  if (games.length === 0) {
    bar.innerHTML = '';
    grid.innerHTML = '<div class="today-empty">No playoff games scheduled today.</div>';
    return;
  }

  bar.innerHTML = games.map(([h, a]) =>
    `<div class="today-matchup"><span>${h}</span> vs <span>${a}</span></div>`
  ).join('');

  // Filter managers to only those with at least one player in today's games
  const mgrsWithPlayers = MANAGERS.filter(m => DRAFT[m.id].some(p => todayTeams.has(p.team)));

  if (mgrsWithPlayers.length === 0) {
    grid.innerHTML = '<div class="today-empty">No pool players in today\'s games.</div>';
    return;
  }

  grid.innerHTML = mgrsWithPlayers.map(m => buildManagerPanel(m, todayTeams, 'today')).join('');
  Object.keys(collapseState).forEach(key => { if (key.startsWith('today-') && collapseState[key]) applyCollapse(key); });
}

// Shared panel builder — used by both Teams and Active Today views
function buildManagerPanel(m, highlightTeams, viewPrefix) {
  const idPrefix = viewPrefix === 'today' ? 'today-' : '';
  const activeSet = new Set(ACTIVE_TEAMS[m.id] || []);
  const isElim = p => activeSet.size > 0 && !activeSet.has(p.team);
  const isToday = p => highlightTeams && highlightTeams.has(p.team);

  // In today view, only include players with a game today
  const filterFn = viewPrefix === 'today' ? p => isToday(p) : () => true;
  const sortSection = players => [...players].filter(filterFn).sort((a, b) => isElim(a) - isElim(b));

  const row = p => {
    const s = playerStats[p.nhlId];
    const pt = calc(s, p.type);
    const elim = isElim(p);
    const chips = p.type === 'goalie'
      ? `<span class="stat-chip ${s&&s.wins?'v':''}">W:${s?s.wins:'–'}</span><span class="stat-chip ${s&&s.shutouts?'v':''}">SO:${s?s.shutouts:'–'}</span>`
      : `<span class="stat-chip ${s&&s.goals?'v':''}">G:${s?s.goals:'–'}</span><span class="stat-chip ${s&&s.assists?'v':''}">A:${s?s.assists:'–'}</span>`;
    return `<div class="player-row${elim?' eliminated':''}">
      <div class="team-abbr">${p.team}</div>
      <div class="player-name">${p.name}</div>
      <div class="player-stats">${chips}</div>
      <div class="player-pts ${pt===0?'z':''}">${pt}</div>
    </div>`;
  };

  const sk = sortSection(DRAFT[m.id].filter(p => p.type==='skater'));
  const go = sortSection(DRAFT[m.id].filter(p => p.type==='goalie'));
  if (sk.length === 0 && go.length === 0) return '';

  const t = [sk, go].flat().reduce((sum, p) => sum + calc(playerStats[p.nhlId], p.type), 0);
  const dim = activeManager && activeManager !== m.id;
  const panelId = `${idPrefix}panel-${m.id}`;
  const rosterId = `${idPrefix}roster-${m.id}`;
  const collapseKey = `${idPrefix}${m.id}`;

  const skSection = sk.length ? `<div class="section-label">Skaters</div>${sk.map(row).join('')}` : '';
  const goSection = go.length ? `<div class="section-label">Goalies</div>${go.map(row).join('')}` : '';

  return `<div class="team-panel ${dim?'dimmed':''}" id="${panelId}">
    <div class="team-header" style="--mgr-color:${m.color}" onclick="toggleRoster('${collapseKey}','${panelId}','${rosterId}')">
      <div class="team-header-name">${m.name}</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="team-header-score">${t}</div>
        <span class="toggle-pill"><span class="pill-arrow">▾</span><span class="pill-label">Hide</span></span>
      </div>
    </div>
    <div class="roster-body" id="${rosterId}">
      ${skSection}${goSection}
    </div>
  </div>`;
}

// ── Collapse state ──
const collapseState = {};

function toggleRoster(key, panelId, rosterId) {
  collapseState[key] = !collapseState[key];
  applyCollapse(key, collapseState[key], panelId, rosterId);
}

function applyCollapse(key, collapsed, panelId, rosterId) {
  // Support being called with just key (restore pass) — derive IDs from key
  if (!panelId) {
    const isToday = key.startsWith('today-');
    const mId = isToday ? key.replace('today-','') : key;
    panelId = isToday ? `today-panel-${mId}` : `panel-${mId}`;
    rosterId = isToday ? `today-roster-${mId}` : `roster-${mId}`;
  }
  const panel = document.getElementById(panelId);
  const body  = document.getElementById(rosterId);
  if (!panel || !body) return;
  const label = panel.querySelector('.pill-label');
  if (collapsed) {
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(() => {
      panel.classList.add('collapsed');
      body.style.maxHeight = '0';
      if (label) label.textContent = 'Show';
    });
  } else {
    panel.classList.remove('collapsed');
    body.style.maxHeight = body.scrollHeight + 'px';
    if (label) label.textContent = 'Hide';
    body.addEventListener('transitionend', () => { body.style.maxHeight = ''; }, { once: true });
  }
}

function renderLeaderboard() {
  const allRows = [];
  MANAGERS.forEach(m => {
    const activeSet = new Set(ACTIVE_TEAMS[m.id] || []);
    DRAFT[m.id].forEach(p => {
      const elim = activeSet.size > 0 && !activeSet.has(p.team);
      allRows.push({ m, p, s: playerStats[p.nhlId], pt: calc(playerStats[p.nhlId], p.type), elim });
    });
  });

  let f = activeManager ? allRows.filter(r => r.m.id === activeManager) : allRows;
  if (lbActiveOnly) f = f.filter(r => !r.elim);
  f.sort((a, b) => b.pt - a.pt);
  const totalCount = f.length;
  if (lbShowTop20) f = f.slice(0, 20);

  document.getElementById('btnTop20').classList.toggle('active', lbShowTop20);
  document.getElementById('btnActiveOnly').classList.toggle('active', lbActiveOnly);
  const countEl = document.getElementById('lbFilterCount');
  countEl.textContent = lbShowTop20 && totalCount > 20 ? `showing 20 of ${totalCount}` : `${totalCount} players`;

  document.getElementById('lbBody').innerHTML = f.map((r, i) => {
    const g = r.p.type === 'goalie';
    return `<tr${r.elim ? ' style="opacity:0.38"' : ''}>
      <td class="r" style="color:var(--muted)">${i+1}</td>
      <td><span class="lb-mgr" style="color:${r.m.color}">${r.m.name}</span></td>
      <td${r.elim ? ' style="text-decoration:line-through;text-decoration-color:rgba(255,255,255,0.25)"' : ''}>${r.p.name}</td>
      <td class="r">${r.p.team}</td>
      <td class="r">${g?'—':(r.s?r.s.goals:'–')}</td>
      <td class="r">${g?'—':(r.s?r.s.assists:'–')}</td>
      <td class="r">${g?(r.s?r.s.wins:'–'):'—'}</td>
      <td class="r">${g?(r.s?r.s.shutouts:'–'):'—'}</td>
      <td class="p">${r.pt}</td>
    </tr>`;
  }).join('');
}

function render() {
  renderScoreboard(); renderTeams(); renderToday(); renderLeaderboard();
  const fl = document.getElementById('filterLabel');
  if (activeManager) { const m = MANAGERS.find(x => x.id===activeManager); fl.textContent = `Showing: ${m.name}`; fl.style.color = m.color; }
  else { fl.textContent = ''; }
}

// ── Controls ──
function toggleManager(id) { activeManager = activeManager === id ? null : id; render(); }
function toggleLbFilter(filter) {
  if (filter === 'top20') lbShowTop20 = !lbShowTop20;
  if (filter === 'active') lbActiveOnly = !lbActiveOnly;
  renderLeaderboard();
}
function setView(v) {
  currentView = v;
  document.getElementById('teamsView').classList.toggle('hidden', v !== 'teams');
  document.getElementById('todayView').classList.toggle('active', v === 'today');
  document.getElementById('leaderboardView').classList.toggle('active', v === 'leaderboard');
  document.getElementById('btnTeams').classList.toggle('active', v === 'teams');
  document.getElementById('btnToday').classList.toggle('active', v === 'today');
  document.getElementById('btnLeaderboard').classList.toggle('active', v === 'leaderboard');
  render();
}
function showError(msg) {
  const el = document.getElementById('errorBanner');
  if (msg) { el.textContent = msg; el.classList.add('show'); } else { el.classList.remove('show'); }
}

// ── Boot ──
render();
fetchAllStats();
fetchTodayGames();
scheduleNextDayRefresh();
setInterval(fetchAllStats, 5 * 60 * 1000);
